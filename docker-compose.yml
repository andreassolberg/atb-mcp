services:
  mcp:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./credentials:/app/credentials:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/sa-key.json
      - GCP_PROJECT=solberg-cluster
      - BQ_MAX_BYTES_GB=10
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    restart: unless-stopped
